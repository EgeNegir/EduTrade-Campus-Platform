<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İlan Ver - EduTrade</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f6f1eb; font-family: 'Outfit', sans-serif; color: #2e3d2c; }
        h1, h2, h3, h4, .serif-font { font-family: 'Playfair Display', serif; color: #2e3d2c; }
        .navbar { background-color: #ffffff !important; border-bottom: 1px solid #e6dfd5; }
        .navbar-brand { font-family: 'Playfair Display', serif; font-weight: 700; color: #2e3d2c !important; letter-spacing: 1px; }
        .form-card { background-color: #ffffff; border: 1px solid #e6dfd5; border-radius: 0px; }
        .form-control, .form-select { border-radius: 0px; background-color: #faf8f5; border: 1px solid #d8d3cd; padding: 12px 15px; color: #2e3d2c; }
        .form-control:focus, .form-select:focus { border-color: #2e3d2c; box-shadow: none; background-color: #ffffff; }
        .btn-custom-primary { background-color: #2e3d2c; color: white; border-radius: 0px; padding: 12px 35px; font-weight: 600; letter-spacing: 1px; border: 1px solid #2e3d2c; transition: all 0.3s; }
        .btn-custom-primary:hover { background-color: #1f2a1e; border-color: #1f2a1e; color: white; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg py-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="images/logoi.png" alt="EduTrade Logo" width="35" class="me-2"> EduTrade
            </a>
            <div class="ms-auto" id="userMenu"></div>
        </div>
    </nav>

    <div class="container my-5 py-3">
        <div class="row">
            <div class="col-lg-8 mx-auto">
                <div class="form-card shadow-sm p-4 p-md-5">
                    <h2 class="serif-font fw-bold mb-2">Yeni Takas İlanı Oluştur</h2>
                    <p class="text-muted mb-5">Kullanmadığın materyalleri veya verebileceğin bir eğitimi paylaş, kampüs dayanışmasına katıl.</p>
                    
                    <form id="ilanVerFormu">
                        <div class="mb-4">
                            <label for="baslik" class="form-label fw-medium text-dark" style="font-size: 0.9rem;">İLAN BAŞLIĞI</label>
                            <input type="text" class="form-control" id="baslik" name="baslik" placeholder="Örn: Thomas Calculus 14. Basım Kitap" required>
                        </div>

                        <div class="mb-4">
                            <label for="kategori" class="form-label fw-medium text-dark" style="font-size: 0.9rem;">BU İLANIN KATEGORİSİ</label>
                            <select class="form-select" id="kategori" name="kategori" required>
                                <option value="" selected disabled>Seçiniz...</option>
                                <option value="Kitap / Not">Kitap / Not</option>
                                <option value="Elektronik">Elektronik</option>
                                <option value="Özel Ders">Özel Ders</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-medium text-dark" style="font-size: 0.9rem;">KARŞILIĞINDA NE İSTİYORSUN? (Çapraz Takas)</label>
                            <div class="input-group">
                                <select class="form-select" id="istenen_kategori" style="max-width: 180px;">
                                    <option value="Fark Etmez">Fark Etmez</option>
                                    <option value="Kitap / Not">📚 Kitap / Not</option>
                                    <option value="Elektronik">💻 Elektronik</option>
                                    <option value="Özel Ders">🦉 Özel Ders</option>
                                </select>
                                <input type="text" class="form-control" id="takas_istegi_detay" placeholder="Örn: Arduino seti, Calculus kitabı..." required>
                            </div>
                            <div class="form-text text-muted small mt-1" style="font-style: italic;">
                                Örn: Özel ders verip karşılığında elektronik bir eşya veya kitap isteyebilirsin.
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="aciklama" class="form-label fw-medium text-dark" style="font-size: 0.9rem;">İLAN AÇIKLAMASI</label>
                            <textarea class="form-control" id="aciklama" name="aciklama" rows="4" placeholder="Ürünün durumu hakkında bilgi verin..." required></textarea>
                        </div>

                        <div class="mb-5">
                            <label for="fotograflar" class="form-label fw-medium text-dark" style="font-size: 0.9rem;">İLAN FOTOĞRAFLARI (MAKSİMUM 3 ADET)</label>
                            <input type="file" class="form-control" id="fotograflar" name="fotograflar" accept="image/*" multiple>
                            <div class="form-text text-muted">Aynı anda en fazla 3 fotoğraf seçebilirsiniz. Fotoğraf başına limit 5MB'dır.</div>
                        </div>

                        <button type="submit" class="btn btn-custom-primary w-100 py-3 fw-bold">İLANI YAYINLA</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const kullanici = localStorage.getItem('kullaniciAdSoyad');
            const mail = localStorage.getItem('kullaniciEmail');
            const userMenu = document.getElementById('userMenu');
            
            if (!kullanici) {
                alert("İlan verebilmek için önce giriş yapmalısınız!");
                window.location.href = "giris.html";
                return;
            }

            userMenu.innerHTML = `
                <div class="d-flex align-items-center">
                    <span class="me-3 fw-bold serif-font" style="font-size: 1.1rem; color: #2e3d2c;">👋 ${kullanici}</span>
                    <button onclick="localStorage.clear(); window.location.href='giris.html';" class="btn btn-sm btn-outline-danger fw-bold" style="border-radius: 0px;">ÇIKIŞ</button>
                </div>
            `;

            const fileInput = document.getElementById('fotograflar');
            fileInput.addEventListener('change', function() {
                if (this.files.length > 3) {
                    alert("Hata: Bir ilana en fazla 3 adet fotoğraf ekleyebilirsiniz!");
                    this.value = ''; 
                }
            });

            // Form Gönderme İşlemini Yakalayan ve Çapraz Takası Birleştiren Fonksiyon
            document.getElementById('ilanVerFormu').addEventListener('submit', async function(e) {
                e.preventDefault(); // Sayfanın yenilenmesini durdur

                // FormData oluştur
                const formData = new FormData(this);

                // Gizli bilgileri form datasına ekle
                formData.append('sahibi', kullanici);
                formData.append('sahibi_email', mail);

                // Çapraz takas bilgilerini birleştir
                const istenenKategori = document.getElementById('istenen_kategori').value;
                const takasDetay = document.getElementById('takas_istegi_detay').value;
                let birlesikTakasIstegi = '';

                if (istenenKategori === "Fark Etmez") {
                    birlesikTakasIstegi = takasDetay;
                } else {
                    birlesikTakasIstegi = `[${istenenKategori}] ${takasDetay}`;
                }

                // Birleştirilmiş veriyi 'takas_istegi' adıyla  form verisine ekle
                formData.append('takas_istegi', birlesikTakasIstegi);

                try {
                    const response = await fetch('/api/ilanlar', {
                        method: 'POST',
                        body: formData // Form verisini server.js'e gönder
                    });

                    if (response.ok) {
                        alert("Harika! İlanınız başarıyla yayınlandı.");
                        window.location.href = "index.html"; // Ana sayfaya yönlendir
                    } else {
                        const errorMsg = await response.text();
                        alert("İlan yüklenirken bir hata oluştu: " + errorMsg);
                    }
                } catch (err) {
                    console.error("Fetch Hatası:", err);
                    alert("Sunucuya bağlanılamadı.");
                }
            });
        });
    </script>
</body>
</html>
