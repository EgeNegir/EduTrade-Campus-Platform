<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap - EduTrade</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /*  Temel Tasarım Stilleri  */
        body {
            background-color: #f6f1eb; /* arka plan */
            font-family: 'Outfit', sans-serif;
            color: #2e3d2c; /* metin */
        }
        h1, h2, h3, h4, .serif-font {
            font-family: 'Playfair Display', serif; 
            color: #2e3d2c;
        }

        /* Giriş Kartı Stilleri */
        .login-card {
            background-color: #ffffff;
            border-radius: 20px; 
            overflow: hidden; 
        }

        
        .login-side-panel {
            
            width: 90%; 
            margin: 5% auto; 
            border-radius: 20px; 
            
           
            background-image: url('images/kampus.jpg');
            background-size: cover;
            background-position: center;
            
            
            min-height: calc(100% - 10%); 
            
            position: relative; 
            box-shadow: 0 10px 30px rgba(46, 61, 44, 0.1);
        }
        
        
        .image-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
          
            border-radius: 0 0 20px 20px;
            
            
            background: linear-gradient(to top, rgba(46, 61, 44, 0.95), transparent);
            padding: 30px;
            color: #f6f1eb;
            text-align: center;
        }
        
        /* Buton ve Link Stilleri */
        .custom-btn {
            background-color: #2e3d2c; 
            color: white;
            border-radius: 0px; 
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        .custom-btn:hover {
            background-color: #1f2a1e;
            color: white;
        }
        .custom-link {
            color: #2e3d2c;
            text-decoration: none;
            border-bottom: 1px solid #2e3d2c;
        }
        .custom-link:hover {
            color: #1f2a1e;
            border-bottom: 2px solid #1f2a1e;
        }
        
        /* Form Input Stilleri */
        .form-control {
            border-radius: 0px; 
            background-color: #faf8f5;
            border: 1px solid #d8d3cd;
            padding: 12px 15px;
        }
        .form-control:focus {
            border-color: #2e3d2c;
            box-shadow: none;
            background-color: #ffffff;
        }
    </style>
</head>
<body class="d-flex align-items-center" style="min-height: 100vh;">

    <div class="container py-4">
        <div class="row login-card shadow-sm mx-auto p-2 p-md-3" style="max-width: 1000px;">
            
            <div class="col-md-6 d-none d-md-block p-0">
                <div class="login-side-panel">
                    <div class="image-overlay">
                        <p class="mb-1" style="font-family: 'Outfit', sans-serif; font-weight: 300; letter-spacing: 1px;">SADECE ÖĞRENCİLERE ÖZEL</p>
                        <h2 class="fw-bold mb-0 text-white serif-font" style="font-size: 2rem;">Kampüste Paylaşım Zamanı.</h2>
                    </div>
                </div>
            </div>

            <div class="col-md-6 px-4 px-md-5 py-5 d-flex flex-column justify-content-center">
                
                <div class="text-end mb-5">
                    <a href="index.html" class="text-decoration-none">
                        <h3 class="serif-font fw-bold mb-0" style="letter-spacing: 1px;">EduTrade</h3>
                    </a>
                </div>

                <h2 class="fw-bold mb-2 serif-font">Tekrar Hoş Geldin</h2>
                <p class="text-muted mb-5" style="font-size: 0.95rem;">Hesabına erişmek ve takaslara devam etmek için giriş yap.</p>

                <form action="/giris" method="POST">
                    <div class="mb-4">
                        <label for="email" class="form-label fw-medium text-dark small">ÖĞRENCİ E-POSTASI</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="ornek@ogr.inonu.edu.tr" required>
                    </div>
                    
                    <div class="mb-4">
                        <label for="sifre" class="form-label fw-medium text-dark small">ŞİFRE</label>
                        <input type="password" class="form-control" id="sifre" name="sifre" placeholder="••••••••" required>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-5">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="rememberMe" style="border-radius: 0;">
                            <label class="form-check-label text-muted small" for="rememberMe">Beni Hatırla</label>
                        </div>
                        <a href="sifremi-unuttum.html" class="custom-link small">Şifremi Unuttum</a>
                    </div>

                    <button type="submit" class="btn custom-btn w-100 py-3 fw-bold mb-4">GİRİŞ YAP</button>
                    
                    <div class="text-center mt-3">
                        <span class="text-muted small">Henüz bir hesabın yok mu?</span> 
                        <a href="kayit.html" class="custom-link fw-bold small" style="margin-left: 5px;">Kayıt Ol</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
