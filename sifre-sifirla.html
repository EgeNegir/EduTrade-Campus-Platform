<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeni Şifre Belirle - EduTrade</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f6f1eb; font-family: 'Outfit', sans-serif; color: #2e3d2c; }
        h2 { font-family: 'Playfair Display', serif; color: #2e3d2c; }
        .form-card { background-color: #ffffff; border: 1px solid #e6dfd5; border-radius: 0px; }
        .form-control { border-radius: 0px; background-color: #faf8f5; border: 1px solid #d8d3cd; padding: 12px 15px; }
        .form-control:focus { border-color: #2e3d2c; box-shadow: none; background-color: #ffffff; }
        .btn-custom-primary { background-color: #2e3d2c; color: white; border-radius: 0px; padding: 12px 35px; font-weight: 600; border: 1px solid #2e3d2c; transition: all 0.3s; }
        .btn-custom-primary:hover { background-color: #1f2a1e; border-color: #1f2a1e; color: white; }
    </style>
</head>
<body>
    <div class="container my-5 py-5">
        <div class="row">
            <div class="col-md-6 mx-auto">
                <div class="form-card shadow-sm p-4 p-md-5">
                    <h2 class="fw-bold mb-3 text-center">Yeni Şifre Belirle</h2>
                    <p class="text-muted text-center mb-4">Lütfen hesabınız için yeni ve güvenli bir şifre giriniz.</p>
                    
                    <form id="resetForm">
                        <div class="mb-4">
                            <label class="form-label fw-medium small">YENİ ŞİFRE</label>
                            <input type="password" class="form-control" id="yeniSifre" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-custom-primary w-100 py-3 fw-bold">ŞİFREYİ GÜNCELLE</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token'); // URL'deki gizli token'ı alıyoruz

        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const yeniSifre = document.getElementById('yeniSifre').value;

            try {
                const response = await fetch('/api/sifre-sifirla', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, yeniSifre })
                });

                const mesaj = await response.text();
                alert(mesaj);
                if (response.ok) {
                    window.location.href = "giris.html"; // Başarılıysa girişe gönder
                }
            } catch (err) {
                console.error(err);
                alert("Bir hata oluştu.");
            }
        });
    </script>
</body>
</html>
